<head>

    <style>
        :root {
            --color-purple: #8a2be2;
            --color-pink: #ff69b4;
            --color-white: #ffffff;
            --color-black: #000000;
            --color-dark-purple: #4b0082;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background: url('https://i.ibb.co/TBLpqM1C/poke1.png' ) no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Splash Screen / Portal Pokébola */
        #splashScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, var(--color-white) 0%, var(--color-pink) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            overflow: hidden;
        }

        .pokemon-circle-container {
            position: absolute;
            width: 95vw;
            height: 95vw;
            max-width: 600px;
            max-height: 600px;
            top: 50%;
            left: 45%;
            transform: translate(-50%, -50%);
            z-index: 4;
        }

        @media (max-width: 768px) {
            .pokemon-circle-container { width: 85vw; height: 85vw; }
        }

        @media (max-width: 480px) {
            .pokemon-circle-container { width: 80vw; height: 80vw; left: 40%; }
        }

        .portal-container {
            position: absolute;
            width: 200px;
            height: 200px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s;
            z-index: 10;
        }

        #splashScreen:hover .portal-container { transform: translate(-50%, -50%) scale(1.1); }

        .pokeball-img {
            width: 150px;
            height: auto;
            z-index: 2;
            filter: drop-shadow(0 0 20px rgba(138, 43, 226, 0.3));
        }

        .portal-circle {
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 50px rgba(255, 105, 180, 0.8);
            animation: pulsePortal 2s infinite;
        }

        @keyframes pulsePortal {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }

        .portal-text {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            color: var(--color-dark-purple);
            letter-spacing: 1px;
            text-shadow: 2px 2px 0 white;
            animation: blink 1.5s infinite;
            z-index: 10;
            white-space: nowrap;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .gif-bixinho {
            position: absolute;
            width: 110px;
            height: auto;
            pointer-events: auto;
            animation: pulseBixinho 3s infinite ease-in-out;
            z-index: 5;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
            cursor: pointer;
            transition: filter 0.3s ease, width 0.3s ease;
        }

        @media (max-width: 480px) {
            .gif-bixinho { width: 75px; }
        }

        .gif-bixinho:hover {
            filter: drop-shadow(0 0 20px rgba(255, 105, 180, 1)) drop-shadow(0 0 30px rgba(138, 43, 226, 1));
        }

        @keyframes pulseBixinho {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(1.1) translateY(-5px); }
            100% { transform: scale(1) translateY(0); }
        }

        .gif-1 { top: 0%; left: 50%; transform: translate(-50%, -50%); animation-delay: 0s; }
        .gif-2 { top: 11.7%; left: 82.1%; transform: translate(-50%, -50%); animation-delay: 0.2s; }
        .gif-3 { top: 41.3%; left: 98.5%; transform: translate(-50%, -50%); animation-delay: 0.4s; }
        .gif-4 { top: 71.7%; left: 88.3%; transform: translate(-50%, -50%); animation-delay: 0.6s; }
        .gif-5 { top: 93.3%; left: 62.8%; transform: translate(-50%, -50%); animation-delay: 0.8s; }
        .gif-6 { top: 93.3%; left: 37.2%; transform: translate(-50%, -50%); animation-delay: 1s; }
        .gif-7 { top: 71.7%; left: 11.7%; transform: translate(-50%, -50%); animation-delay: 1.2s; }
        .gif-8 { top: 41.3%; left: 1.5%; transform: translate(-50%, -50%); animation-delay: 1.4s; }
        .gif-9 { top: 11.7%; left: 17.9%; transform: translate(-50%, -50%); animation-delay: 1.6s; }

        @keyframes sparkle {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            animation: sparkle 0.8s ease-out forwards;
            z-index: 9998;
        }

        .main-wrapper {
            width: 100%;
            max-width: 450px;
            aspect-ratio: 4 / 5;
            background: var(--color-black);
            padding: 10px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
            animation: cardEntrance 1s ease-out;
            display: flex;
            flex-direction: column;
            border: 4px solid var(--color-purple);
        }

        @keyframes cardEntrance {
            0% { transform: translateY(50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .card-inner {
            flex: 1;
            background: var(--color-white);
            border-radius: 12px;
            border: 3px solid var(--color-black);
            padding: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, var(--color-white) 0%, #fff0f5 100%);
        }

        .card-header {
            text-align: center;
            border-bottom: 3px solid var(--color-purple);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .card-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.1rem;
            color: var(--color-dark-purple);
            display: block;
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--color-pink);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-highlight {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            color: var(--color-purple);
            text-align: center;
            margin-bottom: 10px;
            display: block;
        }

        .card-image-area {
            width: 100%;
            flex: 1;
            background: rgba(255, 255, 255, 0.5);
            border: 3px solid var(--color-pink);
            box-shadow: inset 0 0 15px rgba(255, 105, 180, 0.2);
            margin-bottom: 12px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 10px;
            border-radius: 10px;
        }

        .prompt-box {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: var(--color-black);
            overflow-y: auto;
            scrollbar-width: thin;
            padding-bottom: 50px;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1rem;
        }

        .gif-bottom-border {
            position: absolute;
            bottom: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: auto;
            z-index: 10;
            pointer-events: none;
        }

        .copy-btn {
            background: var(--color-purple);
            color: var(--color-white);
            border: 3px solid var(--color-black);
            padding: 12px;
            border-radius: 10px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--color-black);
            transition: 0.1s;
            width: 100%;
        }

        .copy-btn:hover { background: var(--color-dark-purple); }
        .copy-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--color-black); }

        footer {
            margin-top: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .social-tag {
            color: var(--color-pink);
            text-decoration: none;
            font-weight: 900;
            font-size: 0.85rem;
            text-transform: uppercase;
            text-shadow: 1px 1px 0px var(--color-black);
        }

        .footer-legal {
            font-size: 0.55rem;
            color: #fff;
            background: rgba(0,0,0,0.5);
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
            margin: 0 auto;
        }

        #notification {
            position: fixed;
            top: 20px;
            background: var(--color-purple);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.5rem;
            display: none;
            z-index: 10000;
            border: 2px solid var(--color-black);
        }

        #musicPlayerContainer { display: none; }
    </style>
</head>
<body>

    <div id="splashScreen" onclick="enterSite()">
        <div class="pokemon-circle-container">
            <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExczVzajhyaHJ3ZDYzZ3NrY2EzcHJ4MXhjcHppeTUyZGl6NHJiMms1NSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/oAUlEvrr89NIFDVhbs/giphy.gif" class="gif-bixinho gif-1" onclick="createSparkles(event )">
            <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ3Nyc3RreXF0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0JmY3Q9cw/3o7TKMG7r7y7r8y7rO/giphy.gif" class="gif-bixinho gif-2" onclick="createSparkles(event )">
            <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ3Nyc3RreXF0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0JmY3Q9cw/3o7TKMG7r7y7r8y7rO/giphy.gif" class="gif-bixinho gif-3" onclick="createSparkles(event )">
            <img src="https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ3Nyc3RreXF0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0JmY3Q9cw/3o7TKMG7r7y7r8y7rO/giphy.gif" class="gif-bixinho gif-4" onclick="createSparkles(event )">
            <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ3Nyc3RreXF0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0JmY3Q9cw/3o7TKMG7r7y7r8y7rO/giphy.gif" class="gif-bixinho gif-5" onclick="createSparkles(event )">
            <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ3Nyc3RreXF0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0JmY3Q9cw/3o7TKMG7r7y7r8y7rO/giphy.gif" class="gif-bixinho gif-6" onclick="createSparkles(event )">
            <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ3Nyc3RreXF0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0JmY3Q9cw/3o7TKMG7r7y7r8y7rO/giphy.gif" class="gif-bixinho gif-7" onclick="createSparkles(event )">
            <img src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ3Nyc3RreXF0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0JmY3Q9cw/3o7TKMG7r7y7r8y7rO/giphy.gif" class="gif-bixinho gif-8" onclick="createSparkles(event )">
            <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ3Nyc3RreXF0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0JmY3Q9cw/3o7TKMG7r7y7r8y7rO/giphy.gif" class="gif-bixinho gif-9" onclick="createSparkles(event )">
        </div>
        <div class="portal-container">
            <div class="portal-circle"></div>
            <img src="https://raw.githubusercontent.com/imvuluke/assets/main/pokeball.png" alt="Pokeball" class="pokeball-img">
            <div class="portal-text">CLIQUE PARA ENTRAR</div>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="card-inner">
            <header class="card-header">
                <span class="card-name">LUKE</span>
                <span class="card-subtitle">TEZZA PROMPTS</span>
            </header>

            <span class="section-highlight">PROMPT EXCLUSIVO</span>

            <div class="card-image-area">
                <div id="promptContent" class="prompt-box">
                    <pre>Seu prompt incrível aqui...</pre>
                </div>
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExZ3Nyc3RreXF0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0N2R0JmY3Q9cw/3o7TKMG7r7y7r8y7rO/giphy.gif" class="gif-bottom-border">
            </div>

            <button id="copyBtn" class="copy-btn" onclick="copyPrompt( )">Copiar Prompt</button>
        </div>

        <footer>
            <a href="https://instagram.com/imvuluke" target="_blank" class="social-tag">@imvuluke</a>
            <div class="footer-legal">TEZZA PROMPTS © 2024</div>
        </footer>
    </div>

    <div id="notification">Prompt Copiado!</div>
    <textarea id="hiddenTextarea" style="position: absolute; left: -9999px;"></textarea>

    <audio id="bgMusic" loop>
        <source src="https://raw.githubusercontent.com/imvuluke/assets/main/music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const sparkleEmojis = ['✨', '⭐', '💜', '💖', '🔥'];
        const colors = ['#8a2be2', '#ff69b4', '#ffffff'];

        function createSparkles(event ) {
            event.stopPropagation();
            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.textContent = sparkleEmojis[Math.floor(Math.random() * sparkleEmojis.length)];
                sparkle.style.color = colors[Math.floor(Math.random() * colors.length)];
                sparkle.style.left = event.clientX + 'px';
                sparkle.style.top = event.clientY + 'px';
                
                const angle = (Math.PI * 2 * i) / 8;
                const distance = 100;
                sparkle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
                sparkle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
                
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 800);
            }
        }

        function enterSite() {
            const splash = document.getElementById('splashScreen');
            const music = document.getElementById('bgMusic');
            splash.style.opacity = '0';
            splash.style.pointerEvents = 'none';
            music.play().catch(e => console.log("Erro ao tocar música:", e));
            setTimeout(() => { splash.style.display = 'none'; }, 800);
        }

        function copyPrompt() {
            const promptText = document.querySelector('#promptContent pre').innerText;
            const copyBtn = document.getElementById('copyBtn');
            const notification = document.getElementById('notification');
            const hiddenTextarea = document.getElementById('hiddenTextarea');
            
            hiddenTextarea.value = promptText + "\n\n@imvuluke";
            hiddenTextarea.select();
            
            try {
                document.execCommand('copy');
                copyBtn.innerText = "Prompt Copiado!";
                notification.style.display = 'block';
                setTimeout(() => {
                    notification.style.display = 'none';
                    copyBtn.innerText = "Copiar Prompt";
                }, 2000);
            } catch (err) { alert('Erro ao copiar.'); }
        }
    </script>
</body>
