<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>LUKE • TEZZA PROMPTS</title>
    
    <meta property="og:type" content="website">
    <meta property="og:title" content="LUKE • TEZZA PROMPTS">
    <meta property="og:description" content="TEZZA PROMPTS OFICIAL">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Pixelify+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pokemon-blue: #0066cc;
            --pokemon-dark: #000000;
            --pokemon-light: #ffffff;
            --accent-blue: #0080ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pixelify Sans', sans-serif;
        }

        html {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: #050510;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--pokemon-dark);
            overflow: hidden;
            position: relative;
            image-rendering: pixelated;
        }

        

        /* Chuva de Corações AUMENTADOS */
        .heart {
            position: fixed;
            top: -100px;
            width: 80px; /* Corações maiores */
            height: 80px;
            background: url('https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExYXF1Z2JpdmJna3AyaHNnYW85OWZvNWE0aGZoaTd2d201cTZsOGVzZyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/nFA7ZibeOsXdoIkJGQ/giphy.gif') no-repeat center;
            background-size: contain;
            z-index: -1;
            pointer-events: none;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(120vh) rotate(360deg); }
        }

/* GIF adicional caindo */
.chain-fall{
    position: fixed;
    top:-120px;
    width:90px;
    height:90px;
    background:url('https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExamQ4dzAxa3FrdG43YnM3Nndzb3pmdWN4YmhhZWh3NTBzaTBmdDAzdyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/ZZYSw0KsokgwXU2qjL/giphy.gif') no-repeat center;
    background-size:contain;
    pointer-events:none;
    z-index:-1;
    animation:fall linear infinite;
}


        /* Estilo da Carta Pulsante */
        .card-wrapper {
            position: relative;
            width: 100%;
            max-width: 450px;
            aspect-ratio: 3/4.2;
            perspective: 1500px;
            z-index: 10;
            cursor: pointer;
            animation: cardBreathe 10s ease-in-out infinite;
            border-radius: 20px; /* O brilho agora segue o arredondamento */
        }

        @keyframes cardBreathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 25px rgba(0, 128, 255, 0.7); }
            50% { transform: scale(1.06); box-shadow: 0 0 80px rgba(0, 128, 255, 1); }
        }

        .card-container {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            border: 10px solid var(--pokemon-dark);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 0 2px var(--accent-blue);
        }

        /* FRENTE: POKEMON VMAX COM LUZ AZUL */
        .card-front {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 2;
            display: flex;
            flex-direction: column;
            padding: 15px;
            color: white;
        }

        .vmax-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 5px;
        }

        .vmax-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.1rem;
            text-shadow: 2px 2px black;
        }

        .vmax-hp {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.9rem;
            color: #ff4d4d;
        }

        .pokemon-main-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pokemon-image {
            width: 95%;
            height: 95%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px var(--accent-blue));
            animation: pokemonPower 2s ease-in-out infinite alternate;
        }

        @keyframes pokemonPower {
            from { filter: drop-shadow(0 0 20px var(--accent-blue)); }
            to { filter: drop-shadow(0 0 60px var(--accent-blue)); transform: translateY(-12px); }
        }

        .vmax-ability {
            background: rgba(0, 102, 204, 0.85);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 5px;
            border: 2px solid white;
            text-transform: uppercase;
        }

        .vmax-attack {
            border-top: 2px solid rgba(255, 255, 255, 0.3);
            padding-top: 10px;
        }

        .attack-name {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.75rem;
            margin-bottom: 5px;
        }

        .attack-desc {
            font-size: 0.65rem;
            opacity: 0.95;
            line-height: 1.3;
        }

        /* VERSO: PROMPT */
        .card-back {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            transform: rotateY(180deg);
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .card-content {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--accent-blue);
            text-shadow: 2px 2px 0px var(--pokemon-dark);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header-subtitle {
            font-family: 'Pixelify Sans', sans-serif;
            font-size: 0.9rem;
            color: var(--accent-blue);
            font-weight: 700;
            text-transform: uppercase;
            text-shadow: 1px 1px 0px var(--pokemon-dark);
        }

        .card-white-area {
            flex: 1;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.98) 0%, rgba(245, 245, 245, 0.98) 100%);
            border: 3px solid var(--pokemon-dark);
            border-radius: 8px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.1), 0 0 0 2px var(--accent-blue);
        }

        .section-label {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.65rem;
            color: var(--pokemon-dark);
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--pokemon-dark);
            border-radius: 4px;
            font-size: 0.8rem;
            background: white;
            min-height: 120px;
            resize: none;
        }

        .copy-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--pokemon-blue), var(--accent-blue));
            color: white;
            border: 3px solid var(--pokemon-dark);
            padding: 12px;
            border-radius: 6px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.65rem;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.3);
        }

        .card-footer {
            text-align: center;
            margin-top: 15px;
            font-size: 0.65rem;
            color: var(--accent-blue);
            font-weight: 600;
            text-shadow: 1px 1px 0px var(--pokemon-dark);
        }

        .social-tag {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 900;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
        }

        /* Indicador de Clique */
        .click-hint {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-blue);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            animation: bounce 1s infinite;
            z-index: 20;
            border: 3px solid white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -12px); }
        }

        #notification {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: var(--accent-blue);
            color: white;
            padding: 35px 45px;
            border-radius: 12px;
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            text-align: center;
            visibility: hidden;
            opacity: 0;
            z-index: 2000;
            border: 5px solid var(--pokemon-dark);
            transition: all 0.3s;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.6);
            line-height: 1.6;
        }

        #notification.show {
            visibility: visible;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #hiddenTextarea {
            position: absolute;
            left: -9999px;
            opacity: 0;
        }

        #bgMusic {
            display: none;
        }

        @media (max-width: 500px) {
            .card-wrapper { max-width: 100%; }
            .chain-background { background-size: auto 200px; }
            .heart { width: 50px; height: 50px; }
            #notification { font-size: 0.6rem; padding: 25px; }
        }
    </style>
</head>

        const clickHint = document.getElementById('clickHint');
        let musicStarted = false;

        // Gerar Chuva de Corações Aumentados
        function createHearts() {
            for (let i = 0; i < 25; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'heart';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
                    heart.style.opacity = Math.random() * 0.5 + 0.3;
                    heart.style.width = (Math.random() * 60 + 40) + 'px';
                    heart.style.height = heart.style.width;
                    document.body.appendChild(heart);
                    
                    heart.addEventListener('animationiteration', () => {
                        heart.style.left = Math.random() * 100 + 'vw';
                    });
                }, i * 350);
            }
        }
        createHearts();
        // GIFS adicionais
        for(let i=0;i<18;i++){
          setTimeout(()=>{
            const gif=document.createElement('div');
            gif.className='chain-fall';
            gif.style.left=Math.random()*100+'vw';
            gif.style.animationDuration=(Math.random()*5+5)+'s';
            const s=Math.random()*40+70;
            gif.style.width=s+'px';
            gif.style.height=s+'px';
            document.body.appendChild(gif);
            gif.addEventListener('animationiteration',()=>gif.style.left=Math.random()*100+'vw');
          },i*500);
        }

        function flipCard() {
            cardContainer.classList.toggle('flipped');
            clickHint.style.display = 'none';
            
            if (!musicStarted) {
                bgMusic.play().catch(e => console.log("Erro ao tocar áudio:", e));
                musicStarted = true;
            }
        }

        function copyPrompt(event) {
            event.stopPropagation();
            const userText = userPromptInput.value || "[COLOQUE O SEU PROMPT AQUI]";
            const textToCopy = `GEMINI [MODO PRO]\n\n${userText}\n\n@imvuluke`;
            const notification = document.getElementById('notification');
            const copyBtn = document.getElementById('copyBtn');

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    executarSucesso();
                }).catch(() => fallbackCopy(textToCopy));
            } else {
                fallbackCopy(textToCopy);
            }

            function fallbackCopy(text) {
                const textarea = document.getElementById('hiddenTextarea');
                textarea.value = text;
                textarea.select();
                document.execCommand('copy');
                executarSucesso();
            }

            function executarSucesso() {
                copyBtn.innerText = "COPIADO!";
                notification.classList.add('show');
                setTimeout(() => {
                    notification.classList.remove('show');
                    copyBtn.innerText = "Copiar Prompt";
                }, 3000);
            }
        }
    </script>
</body>
</html>
